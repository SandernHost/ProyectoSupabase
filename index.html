<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Trazabilidad Frutas</title>
  <link rel="stylesheet" href="css/estilo.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
  <div class="login-container">
    <h1>🍍 Trazabilidad Logística</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn" style="width:100%">Iniciar sesión</button>
      <div id="errorMsg" style="color:red; margin-top:1rem; text-align:center;"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signIn(email, password);
        // La redirección la maneja el listener de auth
      } catch (error) {
        document.getElementById('errorMsg').textContent = 'Credenciales incorrectas';
      }
    });
  </script>
</body>
</html>
