<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Trazabilidad</title>
  <link rel="stylesheet" href="css/estilo.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <header>
    <nav>
      <div class="logo"><a href="dashboard.html">🍍 TrazaFruit</a></div>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="lotes.html">Lotes</a>
        <a href="productos.html" class="active">Productos</a>
        <a href="ubicaciones.html">Ubicaciones</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="calidad.html">Calidad</a>
        <a href="procesos.html">Procesos</a>
        <a href="perfil.html">Perfil</a>
      </div>
      <div class="user-info">
        <span id="userEmail"></span>
        <button class="btn btn-secondary" onclick="signOut()">Salir</button>
      </div>
    </nav>
  </header>

  <main>
    <h1 class="page-title">Catálogo de Productos</h1>
    <button class="btn" id="btnNuevo">Nuevo Producto</button>

    <div class="table-responsive" style="margin-top:1rem;">
      <table id="tablaProductos">
        <thead>
          <tr><th>Nombre</th><th>Variedad</th><th>Descripción</th><th>Unidad</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div id="formModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
      <div class="form-container" style="max-width:500px; background:white; margin:auto;">
        <h3 id="modalTitle">Nuevo Producto</h3>
        <form id="productoForm">
          <input type="hidden" id="productoId">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="nombre" required>
          </div>
          <div class="form-group">
            <label>Variedad</label>
            <input type="text" id="variedad">
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Unidad de medida *</label>
            <select id="unidad_medida" required>
              <option value="kg">kg</option>
              <option value="lb">lb</option>
              <option value="caja">caja</option>
              <option value="unidad">unidad</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn">Guardar</button>
            <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    async function cargarProductos() {
      try {
        const productos = await fetchAll('productos', { order: { column: 'nombre' } });
        const tbody = document.querySelector('#tablaProductos tbody');
        tbody.innerHTML = productos.map(p => `
          <tr>
            <td>${p.nombre}</td>
            <td>${p.variedad || '-'}</td>
            <td>${p.descripcion || '-'}</td>
            <td>${p.unidad_medida}</td>
            <td>
              <button onclick="editarProducto('${p.id}')">✏️</button>
              <button onclick="eliminarProducto('${p.id}')">🗑️</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error(error);
      }
    }

    window.editarProducto = async (id) => {
      const prod = await fetchById('productos', id);
      document.getElementById('productoId').value = prod.id;
      document.getElementById('nombre').value = prod.nombre;
      document.getElementById('variedad').value = prod.variedad || '';
      document.getElementById('descripcion').value = prod.descripcion || '';
      document.getElementById('unidad_medida').value = prod.unidad_medida;
      document.getElementById('modalTitle').textContent = 'Editar Producto';
      document.getElementById('formModal').style.display = 'flex';
    };

    window.eliminarProducto = async (id) => {
      if (confirm('¿Eliminar producto? Afectará lotes existentes.')) {
        await deleteRecord('productos', id);
        cargarProductos();
      }
    };

    document.getElementById('btnNuevo').addEventListener('click', () => {
      document.getElementById('productoForm').reset();
      document.getElementById('productoId').value = '';
      document.getElementById('modalTitle').textContent = 'Nuevo Producto';
      document.getElementById('formModal').style.display = 'flex';
    });

    window.cerrarModal = () => {
      document.getElementById('formModal').style.display = 'none';
    };

    document.getElementById('productoForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = {
        nombre: document.getElementById('nombre').value,
        variedad: document.getElementById('variedad').value || null,
        descripcion: document.getElementById('descripcion').value || null,
        unidad_medida: document.getElementById('unidad_medida').value
      };

      try {
        const id = document.getElementById('productoId').value;
        if (id) {
          await updateRecord('productos', id, formData);
        } else {
          await insertRecord('productos', formData);
        }
        cerrarModal();
        cargarProductos();
      } catch (error) {
        alert('Error: ' + error.message);
      }
    });

    async function init() {
      const session = await getSession();
      if (!session) window.location.href = 'index.html';
      document.getElementById('userEmail').textContent = session.user.email;
      cargarProductos();
    }
    init();
  </script>
</body>
</html>
